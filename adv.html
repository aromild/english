<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- ⭐ 关键：手机自适应 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 你的图标 -->
    <link rel="apple-touch-icon" href="fuji.png">

    <!-- 推荐一起加 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="My App">

<title>Adverb Practice</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}
.card {
    background: #e0e0e0;
    padding: 20px;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    min-height: 100vh;
    box-sizing: border-box;
}
button {
    width: 100%;
    padding: 16px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    color: white;
}
.blue { background: #1976D2; }
.green { background: #4CAF50; }
.gray { background: #9E9E9E; }
.orange { background: #FF9800; }
.purple { background: #9C27B0; }

.hidden { display: none; }

#counter { text-align: center; color: gray; }

.ex-cn { font-size: 15px; color: #333; }
</style>
</head>

<body>

<div class="card">

<div id="counter"></div>

<h3 id="cn"></h3>
<h3 id="enpron" class="hidden"></h3>
<h3 id="col" class="hidden"></h3>

<h3 id="ex-en" class="hidden"></h3>
<div id="ex-cn" class="hidden ex-cn"></div>

<button class="blue" onclick="showENPron()">英文和音标</button>
<button class="green" onclick="speakWord()">英文发音</button>
<button class="green" onclick="showCol()">搭配</button>
<button class="green" onclick="speakCol()">搭配发音</button>
<button class="blue" onclick="showExample()">例句</button>
<button class="green" onclick="speakExample()">例句发音</button>

<button class="purple" onclick="autoPlayEN()">自动循环（英文）</button>
<button class="purple" onclick="autoPlayCNEN()">自动循环（中英）</button>

<button class="gray" onclick="next()">下一句</button>
<button class="orange" onclick="random()">随机</button>

</div>

<script>

const data = [

{cn:"其实 / 实际上",en:"actually",pron:"/ˈækʧuəli/",col_en:"actually speaking",col_cn:"其实来说",ex_en:"Actually, we still need to check this issue.",ex_cn:"其实，我们还需要确认这个问题。"},

{cn:"基本上",en:"basically",pron:"/ˈbeɪsɪkli/",col_en:"basically done",col_cn:"基本完成",ex_en:"The work is basically done.",ex_cn:"工作基本完成了。"},

{cn:"认真地",en:"seriously",pron:"/ˈsɪəriəsli/",col_en:"take seriously",col_cn:"认真对待",ex_en:"We need to take this issue seriously.",ex_cn:"我们需要认真对待这个问题。"},

{cn:"可能",en:"probably",pron:"/ˈprɑːbəblɪ/",col_en:"probably need",col_cn:"可能需要",ex_en:"It will probably take more time.",ex_cn:"可能还需要更多时间。"},

{cn:"目前",en:"currently",pron:"/ˈkɜːrəntli/",col_en:"currently working",col_cn:"目前处理",ex_en:"We are currently working on it.",ex_cn:"我们目前正在处理。"},

{cn:"一定",en:"definitely",pron:"/ˈdefɪnətli/",col_en:"definitely follow up",col_cn:"一定跟进",ex_en:"I will definitely follow up on this.",ex_cn:"我一定会跟进。"},

{cn:"我个人觉得",en:"personally",pron:"/ˈpɜːrsənəli/",col_en:"personally think",col_cn:"我个人认为",ex_en:"I personally think this plan is better.",ex_cn:"我个人觉得这个方案更好。"},

{cn:"说实话",en:"honestly",pron:"/ˈɑːnɪstli/",col_en:"honestly speaking",col_cn:"说实话",ex_en:"Honestly, I didn’t expect this issue.",ex_cn:"说实话，我没想到这个问题。"},

{cn:"明显地",en:"obviously",pron:"/ˈɑːbviəsli/",col_en:"obviously a problem",col_cn:"明显问题",ex_en:"Obviously, this is a problem.",ex_cn:"很明显，这是个问题。"},

{cn:"立刻",en:"immediately",pron:"/ɪˈmiːdiətli/",col_en:"inform immediately",col_cn:"立刻通知",ex_en:"Please inform me immediately.",ex_cn:"请立刻通知我。"},

{cn:"绝对地",en:"absolutely",pron:"/ˈæbsəluːtli/",col_en:"absolutely agree",col_cn:"完全同意",ex_en:"Absolutely, I agree with you.",ex_cn:"完全同意。"},

{cn:"妥善地",en:"properly",pron:"/ˈprɑːpərli/",col_en:"fix properly",col_cn:"妥善修复",ex_en:"We need to fix it properly.",ex_cn:"我们需要妥善修复。"},

{cn:"逐渐地",en:"gradually",pron:"/ˈgræʤuəli/",col_en:"gradually improve",col_cn:"逐渐改善",ex_en:"The situation is gradually improving.",ex_cn:"情况正在改善。"},

{cn:"最终",en:"eventually",pron:"/ɪˈvenʧuəli/",col_en:"eventually become",col_cn:"最终变成",ex_en:"This could eventually become a serious issue.",ex_cn:"这最终可能变成严重问题。"},

{cn:"稍微",en:"slightly",pron:"/ˈslaɪtli/",col_en:"slightly higher",col_cn:"稍微高",ex_en:"The temperature is slightly higher.",ex_cn:"温度稍微高一点。"},

{cn:"频繁地",en:"frequently",pron:"/ˈfriːkwəntli/",col_en:"happen frequently",col_cn:"频繁发生",ex_en:"This issue happens frequently.",ex_cn:"这个问题经常发生。"},

{cn:"当然",en:"certainly",pron:"/ˈsɜːrtnli/",col_en:"certainly check",col_cn:"当然确认",ex_en:"Certainly, I will check it.",ex_cn:"当然，我会确认。"},

{cn:"几乎不",en:"barely",pron:"/ˈberli/",col_en:"barely have time",col_cn:"几乎没时间",ex_en:"I barely have time today.",ex_cn:"我今天几乎没时间。"},

{cn:"完全地",en:"completely",pron:"/kəmˈpliːtli/",col_en:"completely solved",col_cn:"完全解决",ex_en:"The issue is completely solved.",ex_cn:"问题已经解决。"},

{cn:"积极地",en:"actively",pron:"/ˈæktɪvli/",col_en:"actively working",col_cn:"积极处理",ex_en:"We are actively working on this.",ex_cn:"我们正在积极处理。"},

{cn:"完全正确",en:"exactly",pron:"/ɪgzˈæk(t)li/",col_en:"exactly right",col_cn:"完全正确",ex_en:"That’s exactly what I meant.",ex_cn:"那正是我的意思。"}

];

let index = 0;
let playing = false;

function update(){
    document.getElementById("cn").innerText = data[index].cn;
    document.getElementById("enpron").innerText = data[index].en + " " + data[index].pron;

    document.getElementById("col").innerText = data[index].col_en + "（" + data[index].col_cn + "）";
    document.getElementById("ex-en").innerText = data[index].ex_en;
    document.getElementById("ex-cn").innerText = data[index].ex_cn;

    document.getElementById("enpron").classList.add("hidden");
    document.getElementById("col").classList.add("hidden");
    document.getElementById("ex-en").classList.add("hidden");
    document.getElementById("ex-cn").classList.add("hidden");

    document.getElementById("counter").innerText = (index + 1) + " / " + data.length;
}

function showENPron(){
    document.getElementById("enpron").classList.remove("hidden");
}

function showCol(){document.getElementById("col").classList.remove("hidden");}

function showExample(){
    document.getElementById("ex-en").classList.remove("hidden");
    document.getElementById("ex-cn").classList.remove("hidden");
}

function speak(text, lang="en-US"){
    return new Promise(resolve=>{
        const u = new SpeechSynthesisUtterance(text);
        u.lang = lang;
        u.rate = 0.9;
        u.onend = resolve;
        speechSynthesis.speak(u);
    });
}

function speakWord(){speak(data[index].en);}
function speakCol(){speak(data[index].col_en);}
function speakExample(){speak(data[index].ex_en);}

async function autoPlayEN(){
    playing = true;
    while(playing){
        await speak(data[index].en);
        await speak(data[index].col_en);
    }
}

async function autoPlayCNEN(){
    playing = true;
    while(playing){
        await speak(data[index].cn,"zh-CN");
        await speak(data[index].en);
    }
}

function next(){
    playing = false;
    index = (index + 1) % data.length;
    update();
}

function random(){
    playing = false;
    index = Math.floor(Math.random() * data.length);
    update();
}

update();

</script>

</body>
</html>
