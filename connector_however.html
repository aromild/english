<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connector App</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f2f2f2;
    text-align: center;
}

.container {
    padding: 20px;
    max-width: 400px;
    margin: auto;
}

.page-indicator {
    background: #d9d9d9;
    padding: 6px 0;
    font-size: 14px;
    margin-bottom: 15px;
}

.chinese {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 5px; /* ⭐ 已优化 */
}

.display {
    font-size: 20px;
    margin: 5px 0 15px 0; /* ⭐ 已优化 */
    min-height: 100px;
    white-space: pre-line;
    line-height: 1.6;
}

.buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #007AFF;
    color: white;
    font-size: 14px;
    width: 100%;
}

.full-buttons {
    margin-top: 15px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.next-btn {
    margin-top: 20px;
    width: 100%;
    background: #ff9500;
}

.mp3-btn {
    margin-top: 15px;
}
</style>

<script>
let index = 0;
let timer = null;

const data = [
{cn:"突然", word:"suddenly", sen:"The machine stopped suddenly."},
{cn:"这就是为什么", word:"that’s why", sen:"That’s why production was delayed."},
{cn:"然后", word:"and then", sen:"We checked the system, and then restarted it."},
{cn:"到目前为止", word:"so far", sen:"So far, everything looks good."},
{cn:"但是,监控", word:"however,monitor", sen:"However, we still need to monitor it."},
{cn:"此外,预防", word:"in addition,preventive", sen:"In addition, we will take preventive action."},
{cn:"目前", word:"for now", sen:"For now, everything is under control."}
];

// 初始化
function show(){
    document.getElementById("cn").innerText = data[index].cn;
    document.getElementById("display").innerText = "";
    document.getElementById("page").innerText = (index+1)+" / "+data.length;
}

// 单词
function showWord(){
    document.getElementById("display").innerText = data[index].word;
}

// 单词发音
function speakWord(){
    let msg = new SpeechSynthesisUtterance(data[index].word);
    msg.lang = "en-US";
    speechSynthesis.speak(msg);
}

// 例句
function showSen(){
    document.getElementById("display").innerText = data[index].sen;
}

// 句子发音
function speakSen(){
    let msg = new SpeechSynthesisUtterance(data[index].sen);
    msg.lang = "en-US";
    speechSynthesis.speak(msg);
}

// 全文显示
function showAll(){
    let text = "";
    data.forEach(item=>{
        text += item.sen + "\n\n";
    });
    document.getElementById("display").innerText = text;
}

// 全文朗读
function speakAll(){
    let i = 0;

    function speakNext(){
        if(i >= data.length) return;

        let msg = new SpeechSynthesisUtterance(data[i].sen);
        msg.lang = "en-US";

        msg.onend = function(){
            i++;
            setTimeout(speakNext, 500);
        };

        speechSynthesis.speak(msg);
    }

    speakNext();
}

// MP3 + 自动字幕
function playMP3WithText(){
    let audio = document.getElementById("player");

    audio.currentTime = 0;
    audio.play();

    let i = 0;

    if(timer){
        clearInterval(timer);
    }

    timer = setInterval(()=>{
        if(i >= data.length){
            clearInterval(timer);
            return;
        }

        document.getElementById("display").innerText = data[i].sen;

        document.getElementById("display").scrollIntoView({
            behavior:"smooth",
            block:"center"
        });

        i++;
    }, 2200);
}

// 下一个
function next(){
    index = (index + 1) % data.length;
    show();
}
</script>

</head>

<body>

<div class="container">

<div id="page" class="page-indicator"></div>

<div id="cn" class="chinese"></div>

<div id="display" class="display"></div>

<div class="buttons">
<button onclick="showWord()">单词</button>
<button onclick="speakWord()">🔊</button>

<button onclick="showSen()">例句</button>
<button onclick="speakSen()">🔊</button>
</div>

<div class="full-buttons">
<button onclick="showAll()">全文</button>
<button onclick="speakAll()">🔊</button>
</div>

<div class="mp3-btn">
<button onclick="playMP3WithText()">▶ MP3 + 自动字幕</button>
</div>

<audio id="player">
    <source src="connector_however.mp3" type="audio/mpeg">
</audio>

<button class="next-btn" onclick="next()">➡ 下一个</button>

</div>

<!-- 返回主页 -->
<div style="position: fixed; bottom: 60px; width: 100%; text-align: center;">
<a href="index.html">
<button style="padding:12px 24px; border-radius:8px; background:#4CAF50; color:white;">
⬅ Index
</button>
</a>
</div>

<!-- 版权 -->
<div style="text-align:center; font-size:12px; color:#888; margin:20px 0;">
© 2026 Ken. All rights reserved.
</div>

<script>
show();
</script>

</body>
</html>
