<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connector App</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f2f2f2;
    text-align: center;
}

.container {
    padding: 20px;
    max-width: 400px;
    margin: auto;
}

.page-indicator {
    background: #d9d9d9;
    padding: 6px 0;
    font-size: 14px;
    margin-bottom: 20px;
}

.chinese {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 20px;
}

.display {
    font-size: 18px;
    margin: 20px 0;
    min-height: 100px;
    white-space: pre-line;
}

.buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #007AFF;
    color: white;
    font-size: 14px;
    width: 100%;
}

.full-buttons {
    margin-top: 15px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.next-btn {
    margin-top: 20px;
    width: 100%;
    background: #ff9500;
}
</style>

<script>
let index = 0;

const data = [
{
cn:"突然",
en:"suddenly（机器突然停止了。）",
sen:"The machine stopped suddenly."
},
{
cn:"这就是为什么",
en:"That’s why（这就是为什么生产延误。）",
sen:"That’s why production was delayed."
},
{
cn:"然后",
en:"and then（我们检查系统，然后重新启动。）",
sen:"We checked the system, and then restarted it."
},
{
cn:"到目前为止",
en:"So far（到目前为止一切正常。）",
sen:"So far, everything looks good."
},
{
cn:"但是",
en:"However（但是我们还需要监控。）",
sen:"However, we still need to monitor it."
},
{
cn:"此外",
en:"In addition（此外，我们会采取预防措施。）",
sen:"In addition, we will take preventive action."
},
{
cn:"目前",
en:"For now（目前一切都在控制中。）",
sen:"For now, everything is under control."
}
];

// 初始化显示
function show(){
    document.getElementById("cn").innerText = data[index].cn;
    document.getElementById("display").innerText = "";
    document.getElementById("page").innerText = (index+1)+" / "+data.length;
}

// 显示英文（单词）
function showEN(){
    document.getElementById("display").innerText = data[index].en;
}

// 显示例句
function showSen(){
    document.getElementById("display").innerText = data[index].sen;
}

// 单词发音
function speakEN(){
    let msg = new SpeechSynthesisUtterance(data[index].en);
    msg.lang = "en-US";
    speechSynthesis.speak(msg);
}

// 句子发音
function speakSen(){
    let msg = new SpeechSynthesisUtterance(data[index].sen);
    msg.lang = "en-US";
    speechSynthesis.speak(msg);
}

// ⭐ 全文（显示完整句子）
function showAll(){
    let text = "";
    data.forEach(item=>{
        text += item.sen + "\n\n";
    });
    document.getElementById("display").innerText = text;
}

// ⭐ 全文朗读（完整句子）
function speakAll(){
    let i = 0;

    function speakNext(){
        if(i >= data.length) return;

        let msg = new SpeechSynthesisUtterance(data[i].sen);
        msg.lang = "en-US";

        msg.onend = function(){
            i++;
            setTimeout(speakNext, 500);
        };

        speechSynthesis.speak(msg);
    }

    speakNext();
}

// 下一个
function next(){
    index = (index + 1) % data.length;
    show();
}
</script>

</head>

<body>

<div class="container">

<div id="page" class="page-indicator"></div>

<div id="cn" class="chinese"></div>

<div id="display" class="display"></div>

<div class="buttons">
<button onclick="showEN()">英文</button>
<button onclick="speakEN()">🔊</button>

<button onclick="showSen()">例句</button>
<button onclick="speakSen()">🔊</button>
</div>

<div class="full-buttons">
<button onclick="showAll()">全文</button>
<button onclick="speakAll()">🔊</button>
</div>

<button class="next-btn" onclick="next()">➡ 下一个</button>

</div>

<script>
show();
</script>

<!-- 返回主页 -->
<div style="position: fixed; bottom: 60px; width: 100%; text-align: center;">
<a href="index.html">
<button style="padding:12px 24px; border-radius:8px; background:#4CAF50; color:white;">
⬅ Index
</button>
</a>
</div>

</div>

</body>
</html>
