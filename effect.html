<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Effect">

<title>Effect Family</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  margin:0; background:#f5f7fb;
}

.wrap{max-width:720px; margin:auto; padding:16px;}

.card{
  background:#fff; border-radius:20px; padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.cn{
  font-size:32px; font-weight:700; text-align:center;
  margin:20px 0;
}

.en{font-size:24px; text-align:center;}
.ipa,.pos{text-align:center; color:#555;}

.section-title{
  margin-top:20px; font-weight:700;
}

.line{
  margin-top:8px; padding:10px;
  background:#f3f4f6; border-radius:10px;
}

.buttons{
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:10px; margin-top:20px;
}

.nav{
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:10px; margin-top:15px;
}

button{
  padding:12px; border:none; border-radius:10px;
  background:#e5e7eb; font-size:16px;
}

.speak-btn{
  margin-top:10px;
  background:#dcfce7;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">

    <div class="cn" id="cn"></div>

    <!-- 英文 -->
    <div id="detailArea" class="hidden">
      <div class="en" id="en"></div>
      <div class="ipa" id="ipa"></div>
      <div class="pos" id="pos"></div>
      <button class="speak-btn" onclick="speakWord()">🔊 读单词</button>
    </div>

    <!-- 搭配 -->
    <div id="collocationArea" class="hidden">
      <div class="section-title">常见搭配</div>
      <div class="line" id="collocation"></div>
      <button class="speak-btn" onclick="speakCollocation()">🔊 读搭配</button>
    </div>

    <!-- 例句 -->
    <div id="exampleArea" class="hidden">
      <div class="section-title">例句</div>
      <div class="line" id="example"></div>
      <button class="speak-btn" onclick="speakExample()">🔊 读例句</button>
    </div>

    <!-- 功能按钮 -->
    <div class="buttons">
      <button onclick="showEnglish()">英文</button>
      <button onclick="showCollocation()">搭配</button>
      <button onclick="showExample()">例句</button>
    </div>

    <!-- 切换 -->
    <div class="nav">
      <button onclick="prevCard()">上一个</button>
      <button onclick="nextCard()">下一个</button>
      <button onclick="randomCard()">随机</button>
    </div>

  </div>
</div>

<script>

const cards = [
{
cn:"效果 / 影响 / 结果",
en:"effect",
ipa:"/ɪˈfekt/",
pos:"noun 名词",
collocation:"have an effect on（对…有影响） / side effect（副作用）",
example:"This change has an effect on production.（这个变化对生产有影响。）"
},
{
cn:"有效的",
en:"effective",
ipa:"/ɪˈfektɪv/",
pos:"adjective 形容词",
collocation:"very effective（很有效） / effective solution（有效方案）",
example:"This solution is very effective.（这个方案很有效。）"
},
{
cn:"影响",
en:"affect",
ipa:"/əˈfekt/",
pos:"verb 动词",
collocation:"affect production（影响生产）",
example:"This issue affects production.（这个问题影响生产。）"
}
];

let current = 0;

function resetView(){
  document.getElementById("detailArea").classList.add("hidden");
  document.getElementById("collocationArea").classList.add("hidden");
  document.getElementById("exampleArea").classList.add("hidden");
}

function showEnglish(){
  resetView();
  document.getElementById("detailArea").classList.remove("hidden");
}

function showCollocation(){
  resetView();
  document.getElementById("collocationArea").classList.remove("hidden");
}

function showExample(){
  resetView();
  document.getElementById("exampleArea").classList.remove("hidden");
}

function render(){
  const c = cards[current];

  document.getElementById("cn").innerText = c.cn;
  document.getElementById("en").innerText = c.en;
  document.getElementById("ipa").innerText = c.ipa;
  document.getElementById("pos").innerText = c.pos;
  document.getElementById("collocation").innerText = c.collocation;
  document.getElementById("example").innerText = c.example;

  resetView();
}

function nextCard(){
  current = (current + 1) % cards.length;
  render();
}

function prevCard(){
  current = (current - 1 + cards.length) % cards.length;
  render();
}

function randomCard(){
  current = Math.floor(Math.random() * cards.length);
  render();
}

/* 🔊 发音 */
function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function speakWord(){
  speak(cards[current].en);
}

function speakCollocation(){
  speak(cards[current].collocation.replace(/（.*?）/g,""));
}

function speakExample(){
  speak(cards[current].example.replace(/（.*?）/g,""));
}

render();

</script>
<!-- 固定底部返回按钮（最终版） -->
<div style="
  position: fixed;
  bottom: 20px;
  left: 0;
  width: 100%;
  text-align: center;
">
  <a href="index.html" style="text-decoration:none;">
    <button style="
      padding:12px 24px;
      font-size:16px;
      border:none;
      border-radius:8px;
      background-color:#4CAF50;
      color:white;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    ">
      ⬅ Index
    </button>
  </a>
</div>
</body>
</html>
